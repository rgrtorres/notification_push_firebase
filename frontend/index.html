<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notificação Push</title>
  </head>
  <body>
    <h2>Gerador de Token FCM 🚀</h2>
    <p>Abra o console (F12) para copiar seu token.</p>

    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
      import {
        getMessaging,
        getToken,
      } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-messaging.js";

      // Substitua pelos dados da sua App Web no Firebase Console
      const firebaseConfig = {
        apiKey: "SUA_APIKEY",
        projectId: "SEU_PROJECT_ID",
        messagingSenderId: "SEU_SENDER_ID",
        appId: "SEU_APP_ID",
      };

      const app = initializeApp(firebaseConfig);
      const messaging = getMessaging(app);

      async function solicitarToken() {
        const permission = await Notification.requestPermission();
        if (permission === "granted") {
          const token = await getToken(messaging, {
            vapidKey:
              "SUA_VAPIDKEY",
          });
          console.log("Seu Token Real:", token);
        }
      }

      solicitarToken();
    </script>
  </body>
</html>
